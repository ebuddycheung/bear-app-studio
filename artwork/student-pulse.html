<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealBuddy - Student Pulse</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Student Pulse</h1>
            <div class="subtitle">Generative art for DealBuddy - capturing student energy and deal discovery</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42069" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>
                
                <div class="control-group">
                    <label>Particle Density</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="500" max="5000" step="100" value="2000" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">2000</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Flow Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="flowSpeed" min="0.5" max="3" step="0.1" value="1.5" oninput="updateParam('flowSpeed', this.value)">
                        <span class="value-display" id="flowSpeed-value">1.5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Cluster Size</label>
                    <div class="slider-container">
                        <input type="range" id="clusterSize" min="20" max="150" step="5" value="60" oninput="updateParam('clusterSize', this.value)">
                        <span class="value-display" id="clusterSize-value">60</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Trail Length</label>
                    <div class="slider-container">
                        <input type="range" id="trailLength" min="5" max="50" step="1" value="20" oninput="updateParam('trailLength', this.value)">
                        <span class="value-display" id="trailLength-value">20</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                
                <div class="color-group">
                    <label>Deal Orange (Hot)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#FF6B35" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#FF6B35</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Student Blue (Cool)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#4ECDC4" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#4ECDC4</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Premium Gold</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#FFE66D" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#FFE66D</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="downloadArtwork()">↓ Download PNG</button>
                </div>
                <div class="button-row" style="margin-top: 8px;">
                    <button class="button secondary" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Creating Student Pulse...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // DEALBUDDY - STUDENT PULSE GENERATIVE ART
        // A meticulously crafted algorithm capturing student energy and deal discovery
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 42069,
            particleCount: 2000,
            flowSpeed: 1.5,
            clusterSize: 60,
            trailLength: 20,
            colorPalette: ['#FF6B35', '#4ECDC4', '#FFE66D']
        };

        let defaultParams = {...params};
        let particles = [];
        let flowField = [];
        let cols, rows;
        let scl = 8;
        let completed = false;

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            
            particles = [];
            completed = false;
            
            // Initialize flow field
            cols = floor(width / scl) + 1;
            rows = floor(height / scl) + 1;
            flowField = [];
            
            for (let i = 0; i < cols * rows; i++) {
                flowField.push(0);
            }
            
            // Generate flow field
            generateFlowField();
            
            // Create particles
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new Particle());
            }
            
            background(250, 249, 245);
        }

        function generateFlowField() {
            let yoff = 0;
            for (let y = 0; y < rows; y++) {
                let xoff = 0;
                for (let x = 0; x < cols; x++) {
                    let index = x + y * cols;
                    
                    // Multi-octave noise for organic flow
                    let n1 = noise(xoff * 0.003, yoff * 0.003) * TWO_PI;
                    let n2 = noise(xoff * 0.008 + 100, yoff * 0.008 + 100) * TWO_PI * 0.5;
                    let n3 = noise(xoff * 0.015 + 200, yoff * 0.015 + 200) * TWO_PI * 0.25;
                    
                    // Cluster centers create attraction zones
                    let cx1 = noise(1000, 1000) * width;
                    let cy1 = noise(1000, 2000) * height;
                    let cx2 = noise(2000, 1000) * width;
                    let cy2 = noise(2000, 2000) * height;
                    let cx3 = noise(3000, 3000) * width;
                    let cy3 = noise(3000, 4000) * height;
                    
                    let angle = n1 + n2 + n3;
                    
                    // Add attraction to cluster centers
                    let d1 = dist(x * scl, y * scl, cx1, cy1);
                    let d2 = dist(x * scl, y * scl, cx2, cy2);
                    let d3 = dist(x * scl, y * scl, cx3, cy3);
                    
                    let clusterInfluence = params.clusterSize;
                    if (d1 < clusterInfluence) {
                        angle += (clusterInfluence - d1) / clusterInfluence * PI * 0.5;
                    }
                    if (d2 < clusterInfluence) {
                        angle += (clusterInfluence - d2) / clusterInfluence * PI * 0.5;
                    }
                    if (d3 < clusterInfluence) {
                        angle -= (clusterInfluence - d3) / clusterInfluence * PI * 0.5;
                    }
                    
                    flowField[index] = angle;
                    xoff += 0.01;
                }
                yoff += 0.01;
            }
        }

        function draw() {
            if (completed) return;
            
            let frameCount = 0;
            let maxFrames = params.trailLength * 3;
            
            for (let i = 0; i < params.particleCount; i++) {
                particles[i].follow(flowField, cols, scl);
                particles[i].update(params.flowSpeed);
                particles[i].edges();
                particles[i].show();
                frameCount++;
            }
            
            // Mark complete after trails have been drawn
            if (frameCount >= params.particleCount * params.trailLength) {
                completed = true;
            }
        }

        class Particle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.maxSpeed = 3 * params.flowSpeed;
                this.prevPos = this.pos.copy();
                
                // Randomly assign to color group
                this.colorIndex = floor(random(3));
            }

            follow(flowField, cols, scl) {
                let x = floor(this.pos.x / scl);
                let y = floor(this.pos.y / scl);
                let index = x + y * cols;
                
                if (index >= 0 && index < flowField.length) {
                    let force = p5.Vector.fromAngle(flowField[index]);
                    force.setMag(0.5);
                    this.acc.add(force);
                }
            }

            update(speed) {
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);
            }

            edges() {
                if (this.pos.x > width) {
                    this.pos.x = 0;
                    this.prevPos.x = 0;
                }
                if (this.pos.x < 0) {
                    this.pos.x = width;
                    this.prevPos.x = width;
                }
                if (this.pos.y > height) {
                    this.pos.y = 0;
                    this.prevPos.y = 0;
                }
                if (this.pos.y < 0) {
                    this.pos.y = height;
                    this.prevPos.y = height;
                }
            }

            show() {
                let col = color(params.colorPalette[this.colorIndex]);
                let speed = this.vel.mag();
                
                // Fade based on speed - fast particles are brighter
                let alpha = map(speed, 0, this.maxSpeed, 80, 255);
                col.setAlpha(alpha);
                
                stroke(col);
                strokeWeight(1.5);
                line(this.pos.x, this.pos.y, this.prevPos.x, this.prevPos.y);
                
                this.updatePrev();
            }

            updatePrev() {
                this.prevPos.x = this.pos.x;
                this.prevPos.y = this.pos.y;
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI CONTROL HANDLERS
        // ═══════════════════════════════════════════════════════════════════════

        function updateParam(paramName, value) {
            params[paramName] = parseFloat(value);
            document.getElementById(paramName + '-value').textContent = value;
            initializeSystem();
        }

        function updateColor(colorId, value) {
            let index = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[index] = value;
            document.getElementById(colorId + '-value').textContent = value;
            initializeSystem();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = {...defaultParams};
            
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('flowSpeed').value = params.flowSpeed;
            document.getElementById('flowSpeed-value').textContent = params.flowSpeed;
            document.getElementById('clusterSize').value = params.clusterSize;
            document.getElementById('clusterSize-value').textContent = params.clusterSize;
            document.getElementById('trailLength').value = params.trailLength;
            document.getElementById('trailLength-value').textContent = params.trailLength;
            
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            
            updateSeedDisplay();
            initializeSystem();
        }

        function downloadArtwork() {
            saveCanvas('dealbuddy-student-pulse-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
