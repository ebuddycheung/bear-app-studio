name: DealBuddy
options:
  bundleIdPrefix: com.bearappstudio
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  DealBuddy:
    type: application
    platform: iOS
    sources:
      - path: DealBuddy
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: DealBuddy/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bearappstudio.dealbuddy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
